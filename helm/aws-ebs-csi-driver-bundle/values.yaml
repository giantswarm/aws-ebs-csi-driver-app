# Default values for aws-ebs-csi-driver-bundle.
# This is a YAML-formatted file.
#
# Values are split into three categories:
#
#   BUNDLE-ONLY  – Used exclusively by the bundle chart on the management
#                  cluster. Never forwarded to the workload chart.
#
#   UPSTREAM     – Forwarded to the workload chart under the `upstream:` key
#                  so Helm routes them to the upstream aws-ebs-csi-driver
#                  subchart. The bundle helper combines split registry+repository
#                  fields into a single path the upstream chart expects.
#
#   EXTRAS       – Forwarded to the workload chart at the top level (not under
#                  `upstream:`). Consumed by Giant Swarm extras templates
#                  (NetworkPolicy, VPA, PSS exceptions, etc.).
#
# See the giantswarm.workloadValues helper in templates/_helpers.tpl for the
# exact transformation logic.

# ─── BUNDLE-ONLY ─────────────────────────────────────────────────────────────
# These values are consumed by the bundle chart on the management cluster only.
# They are excluded from the workload chart ConfigMap.

ociRepositoryUrl: oci://gsoci.azurecr.io/charts/giantswarm/aws-ebs-csi-driver

# clusterID is set automatically from the App CR / cluster-values ConfigMap.
# It drives IRSA role naming and Flux resource prefixes.
# clusterID: ""

# ─── UPSTREAM ────────────────────────────────────────────────────────────────
# These values are nested under `upstream:` in the workload chart ConfigMap.
# They configure the unmodified upstream aws-ebs-csi-driver subchart.
# Note: the helper combines registry + repository into a single path
# (e.g. gsoci.azurecr.io/giantswarm/aws-ebs-csi-driver).

# GS container registry (split registry+repository, combined by helper)
image:
  registry: gsoci.azurecr.io
  repository: giantswarm/aws-ebs-csi-driver
  tag: "v1.56.0"

sidecars:
  provisioner:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/csi-provisioner
      tag: "v5.3.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
  attacher:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/csi-attacher
      tag: "v4.9.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
  snapshotter:
    forceEnable: true
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/csi-snapshotter
      tag: "v8.3.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
  livenessProbe:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/livenessprobe
      tag: "v2.16.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
  resizer:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/csi-resizer
      tag: "v1.14.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
  nodeDriverRegistrar:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/csi-node-driver-registrar
      tag: "v2.14.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
  volumemodifier:
    image:
      registry: gsoci.azurecr.io
      repository: giantswarm/volume-modifier-for-k8s
      tag: "v0.8.0"
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi

controller:
  replicaCount: 2
  resources:
    requests:
      cpu: 10m
      memory: 40Mi
    limits:
      cpu: 100m
      memory: 256Mi
  serviceAccount:
    create: true
    name: ebs-csi-controller-sa
    annotations: {}
    automountServiceAccountToken: true
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - effect: NoExecute
      operator: Exists
      tolerationSeconds: 300
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                  - fargate
                  - auto
                  - hybrid
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ebs-csi-controller
            topologyKey: kubernetes.io/hostname
          weight: 100

node:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: eks.amazonaws.com/compute-type
                operator: NotIn
                values:
                  - fargate
                  - auto
                  - hybrid
              - key: node.kubernetes.io/instance-type
                operator: NotIn
                values:
                  - a1.medium
                  - a1.large
                  - a1.xlarge
                  - a1.2xlarge
                  - a1.4xlarge
  resources:
    requests:
      cpu: 10m
      memory: 40Mi
    limits:
      cpu: 100m
      memory: 256Mi

storageClasses:
  - name: gp3
    annotations:
      storageclass.kubernetes.io/is-default-class: "true"
    volumeBindingMode: WaitForFirstConsumer
    reclaimPolicy: Delete
    allowVolumeExpansion: true
    parameters:
      encrypted: "true"
      type: gp3

useOldCSIDriver: true

# ─── EXTRAS ──────────────────────────────────────────────────────────────────
# These values are forwarded to the workload chart at the TOP LEVEL (not under
# upstream:). They are consumed by Giant Swarm extras templates, not the
# upstream subchart.

verticalPodAutoscaler:
  enabled: true
  controller:
    containerPolicies:
      - containerName: ebs-plugin
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: csi-provisioner
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: csi-attacher
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: csi-resizer
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: liveness-probe
        controlledValues: RequestsAndLimits
        mode: Auto
  node:
    containerPolicies:
      - containerName: ebs-plugin
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: node-driver-registrar
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: liveness-probe
        controlledValues: RequestsAndLimits
        mode: Auto

networkPolicy:
  enabled: true

global:
  podSecurityStandards:
    enforced: true
