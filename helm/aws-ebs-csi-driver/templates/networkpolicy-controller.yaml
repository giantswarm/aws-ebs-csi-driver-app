{{- if not .Values.upstream.nodeComponentOnly -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ebs-csi-controller
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aws-ebs-csi-driver.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: ebs-csi-controller
  policyTypes:
  - Egress
  egress:
  - {}
{{- end }}
