# ─── EXTRAS ──────────────────────────────────────────────────────────────────
clusterID: ""

networkPolicy:
  enabled: true

verticalPodAutoscaler:
  enabled: true
  controller:
    containerPolicies:
      - containerName: ebs-plugin
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: csi-provisioner
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: csi-attacher
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: csi-resizer
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: liveness-probe
        controlledValues: RequestsAndLimits
        mode: Auto
  node:
    containerPolicies:
      - containerName: ebs-plugin
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: node-driver-registrar
        controlledValues: RequestsAndLimits
        mode: Auto
      - containerName: liveness-probe
        controlledValues: RequestsAndLimits
        mode: Auto

global:
  podSecurityStandards:
    enforced: true

# ─── UPSTREAM ────────────────────────────────────────────────────────────────
# Only GS-specific overrides — everything else is inherited from the subchart defaults.
upstream:
  nameOverride: aws-ebs-csi-driver

  # GS image mirror (combined registry/repository path)
  image:
    containerRegistry: ""
    repository: gsoci.azurecr.io/giantswarm/aws-ebs-csi-driver
    tag: v1.56.0

  # GS image mirrors + resource limits + security hardening for sidecars
  sidecars:
    provisioner:
      image:
        repository: giantswarm/csi-provisioner
        tag: "v5.3.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    attacher:
      image:
        repository: giantswarm/csi-attacher
        tag: "v4.9.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    snapshotter:
      forceEnable: true
      image:
        repository: giantswarm/csi-snapshotter
        tag: "v8.3.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    livenessProbe:
      image:
        repository: giantswarm/livenessprobe
        tag: "v2.16.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    resizer:
      image:
        repository: giantswarm/csi-resizer
        tag: "v1.14.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    nodeDriverRegistrar:
      image:
        repository: giantswarm/csi-node-driver-registrar
        tag: "v2.14.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
    volumemodifier:
      image:
        repository: giantswarm/volume-modifier-for-k8s
        tag: "v0.8.0"
      resources:
        requests:
          cpu: 10m
          memory: 40Mi
        limits:
          cpu: 100m
          memory: 256Mi
      securityContext:
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false

  # GS overrides for controller
  controller:
    enablePrometheusAnnotations: false
    serviceMonitor:
      labels:
        release: prometheus
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    containerSecurityContext:
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false

  # GS overrides for node
  node:
    enablePrometheusAnnotations: false
    enableWindows: false
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: eks.amazonaws.com/compute-type
                  operator: NotIn
                  values:
                    - fargate
                    - auto
                    - hybrid
                - key: node.kubernetes.io/instance-type
                  operator: NotIn
                  values:
                    - a1.medium
                    - a1.large
                    - a1.xlarge
                    - a1.2xlarge
                    - a1.4xlarge
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 100m
        memory: 256Mi
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: "25%"
    containerSecurityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      privileged: true

  # GS storage configuration
  storageClasses:
    - name: gp3
      annotations:
        storageclass.kubernetes.io/is-default-class: "true"
      volumeBindingMode: WaitForFirstConsumer
      reclaimPolicy: Delete
      parameters:
        encrypted: "true"
        type: gp3

  # GS-specific settings that differ from upstream defaults
  useOldCSIDriver: true
  helmTester:
    enabled: false
